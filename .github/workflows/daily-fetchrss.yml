# This is a basic workflow to help you get started with Actions

name: Fetch devblog

# Controls when the workflow will run

on:
  schedule:
  - cron: "11 0 * * 2-6"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      issues: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v6.3.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Restore scraper dependencies
        run: dotnet restore ./src/scrapecsharp/scrapsummary/scraper/scraper.csproj

      - name: Build scraper
        run: dotnet build ./src/scrapecsharp/scrapsummary/scraper/scraper.csproj --configuration Release --no-restore

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-dotnet-${{ runner.os }}-1.58.0

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: ./src/scrapecsharp/scrapsummary/scraper/bin/Release/net8.0/playwright.ps1 install --with-deps chromium
        shell: pwsh

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: ./src/scrapecsharp/scrapsummary/scraper/bin/Release/net8.0/playwright.ps1 install-deps chromium
        shell: pwsh

      - name: Sync Feeds
        run: dotnet run --project ./src/scrapecsharp/scrapsummary/scraper/scraper.csproj --configuration Release --no-build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR: ${{ github.event.pusher.name }}
          OPENAI_API_TOKEN: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_DEPLOY: ${{ secrets.OPENAI_API_DEPLOY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
