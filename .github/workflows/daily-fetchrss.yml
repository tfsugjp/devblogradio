# This is a basic workflow to help you get started with Actions

name: Fetch devblog

# Controls when the workflow will run

on:
  schedule:
  - cron: "11 0 * * 2-6"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      issues: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore scraper dependencies
        run: dotnet restore ./src/scrapecsharp/scrapsummary/scraper/scraper.csproj

      - name: Build scraper
        run: dotnet build ./src/scrapecsharp/scrapsummary/scraper/scraper.csproj --configuration Release --no-restore

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-dotnet-${{ runner.os }}-chromium-${{ hashFiles('src/scrapecsharp/scrapsummary/scraper/**/*.csproj', 'src/scrapecsharp/scrapsummary/scraper/**/*.props', 'src/scrapecsharp/scrapsummary/scraper/**/*.targets') }}

      - name: Install Playwright browsers
        run: ./src/scrapecsharp/scrapsummary/scraper/bin/Release/net10.0/playwright.ps1 install --with-deps chromium
        shell: pwsh

      - name: Sync Feeds
        run: dotnet run --project ./src/scrapecsharp/scrapsummary/scraper/scraper.csproj --configuration Release --no-build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR: ${{ github.event.pusher.name }}
          OPENAI_API_TOKEN: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_DEPLOY: ${{ secrets.OPENAI_API_DEPLOY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
