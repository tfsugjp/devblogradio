# This is a basic workflow to help you get started with Actions

name: Fetch devblog

# Controls when the workflow will run

on:
  schedule:
  - cron: "11 0 * * 2-6"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      issues: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore scraper dependencies
        run: dotnet restore ./src/scrapecsharp/scrapsummary/scraper/scraper.csproj

      - name: Build scraper
        run: dotnet build ./src/scrapecsharp/scrapsummary/scraper/scraper.csproj --configuration Release --no-restore

      - name: Cache Playwright browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-dotnet-${{ runner.os }}-1.58.0

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: ./src/scrapecsharp/scrapsummary/scraper/bin/Release/net10.0/playwright.ps1 install --with-deps chromium
        shell: pwsh

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: ./src/scrapecsharp/scrapsummary/scraper/bin/Release/net10.0/playwright.ps1 install-deps chromium
        shell: pwsh

      - name: Sync Feeds
        run: dotnet run --project ./src/scrapecsharp/scrapsummary/scraper/scraper.csproj --configuration Release --no-build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR: ${{ github.event.pusher.name }}
          OPENAI_API_TOKEN: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_DEPLOY: ${{ secrets.OPENAI_API_DEPLOY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
